<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Painting Tracker</title>
  </head>
  <body>
    <div id="app">
      <header class="header">
        <h1>Mini Painting Tracker</h1>
        <button id="show-carousel" class="carousel-btn">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="15" height="15"><path stroke-linecap="round" stroke-linejoin="round" d="m2.25 15.75 5.159-5.159a2.25 2.25 0 0 1 3.182 0l5.159 5.159m-1.5-1.5 1.409-1.409a2.25 2.25 0 0 1 3.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 0 0 1.5-1.5V6a1.5 1.5 0 0 0-1.5-1.5H3.75A1.5 1.5 0 0 0 2.25 6v12a1.5 1.5 0 0 0 1.5 1.5Zm10.5-11.25h.008v.008h-.008V8.25Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z" /></svg>
          Gallery
        </button>
      </header>

      <main class="main">
        <dialog id="mini-dialog" class="mini-dialog">
          <div class="mini-dialog-header">
            <h2 id="mini-dialog-title">Add Mini</h2>
            <button id="mini-dialog-close" class="mini-dialog-close" title="Close">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" width="18" height="18"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" /></svg>
            </button>
          </div>
          <form id="mini-form">
            <div class="form-group">
              <label for="mini-name">Name</label>
              <input type="text" id="mini-name" maxlength="27" required>
            </div>

            <div class="form-group">
              <label for="mini-type">Type</label>
              <select id="mini-type" required>
                <option value="32mm">32mm</option>
                <option value="75mm">75mm</option>
                <option value="statue">Statue</option>
                <option value="bust">Bust</option>
              </select>
            </div>

            <div class="form-group">
              <label for="mini-status">Status</label>
              <select id="mini-status">
                <option value="bare">Bare</option>
                <option value="primed">Primed</option>
                <option value="painting">Painting</option>
                <option value="painted">Painted</option>
              </select>
            </div>

            <div class="form-group">
              <label for="mini-tags">Tags</label>
              <input type="text" id="mini-tags" placeholder="e.g. Final Girl, The Happy Trails Horror">
            </div>

            <div class="form-group">
              <label for="mini-image">Image</label>
              <input type="file" id="mini-image" accept="image/*">
            </div>

            <div class="mini-dialog-actions">
              <button type="button" id="mini-dialog-cancel">Cancel</button>
              <button type="submit">Add Mini</button>
            </div>
          </form>
        </dialog>

        <div class="toolbar">
          <input type="text" id="search-input" placeholder="Search...">
          <div class="toolbar-row">
            <select id="filter-tag" multiple>
              <option value="">All</option>
            </select>
          </div>
        </div>

        <section class="mini-list">
          <div class="mini-list-header">
            <div class="mini-list-title">
              <h2>Minis</h2>
              <span id="mini-count" class="mini-count"></span>
              <button id="add-mini-toggle" class="add-mini-toggle" title="Add mini">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" width="16" height="16"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" /></svg>
              </button>
            </div>
            <select id="sort-by">
              <option value="date-newest">Newest</option>
              <option value="date-oldest">Oldest</option>
              <option value="name">Name</option>
              <option value="type">Type</option>
              <option value="status">Status</option>
            </select>
          </div>
          <div id="minis-container"></div>
        </section>
      </main>

      <div id="carousel-modal" class="modal">
        <div class="modal-content">
          <button class="close" title="Close">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" width="20" height="20"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" /></svg>
          </button>
          <div class="carousel-container">
            <div id="carousel" class="carousel">
            </div>
            <button class="carousel-nav prev" id="carousel-prev" title="Previous">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" width="20" height="20"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5" /></svg>
            </button>
            <button class="carousel-nav next" id="carousel-next" title="Next">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" width="20" height="20"><path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5" /></svg>
            </button>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
